<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WallDome</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
overflow-x:hidden;
}

/* BLURRED BACKGROUND */

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url("images/Yami Sukehiro Desktop.png");
background-size:cover;
background-position:center;
filter:blur(80px) brightness(0.6);
transform:scale(1.2);
z-index:-1;
}

/* MAIN WRAPPER */

.wrapper{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

/* GLASS PANEL */

.panel{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border-radius:20px;
padding:30px;
margin-bottom:30px;
}

/* HERO */

.hero{
display:flex;
gap:40px;
align-items:center;
}

.hero img{
width:400px;
border-radius:12px;
}

.hero h1{
font-size:42px;
margin:0;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:20px;
margin-top:20px;
}

.card img{
width:100%;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.card img:hover{
transform:scale(1.05);
}

/* MOBILE FIX */

@media (max-width:768px){

.hero{
flex-direction:column;
text-align:center;
}

.hero img{
width:100%;
max-width:320px;
}

.hero h1{
font-size:32px;
}

}

</style>

</head>

<body>

<div class="bg"></div>

<div class="wrapper">

<div class="panel hero">

<div>

<h1>WallDome</h1>
<p>High quality wallpapers</p>

</div>

<img src="images/Yami Sukehiro Desktop.png">

</div>

<div class="panel">

<h2>New Wallpapers</h2>

<div class="grid">

<div class="card">
<img src="images/Yami Sukehiro Desktop.png">
</div>

<div class="card">
<img src="images/Yami Sukehiro Desktop.png">
</div>

<div class="card">
<img src="images/Yami Sukehiro Desktop.png">
</div>

<div class="card">
<img src="images/Yami Sukehiro Desktop.png">
</div>

</div>

</div>

</div>

</body>

</html>

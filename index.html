<!DOCTYPE html>
<html>

<head>

<title>Anime Wallpapers</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
overflow-x:hidden;
}

/* BLURRED BACKGROUND */

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-size:cover;
background-position:center;
filter:blur(80px) brightness(0.6);
transform:scale(1.2);
z-index:-1;
}

/* MAIN CONTENT */

.wrapper{
max-width:1100px;
margin:auto;
padding:60px 20px;
}

/* GLASS PANEL */

.panel{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border-radius:20px;
padding:30px;
margin-bottom:40px;
}

/* HERO */

.hero{
display:flex;
gap:40px;
align-items:center;
}

.hero img{
width:400px;
border-radius:12px;
}

.hero h1{
font-size:48px;
margin:0;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,220px);
gap:20px;
margin-top:20px;
}

.card img{
width:220px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.card img:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="bg" id="bg"></div>

<div class="wrapper">

<div class="panel hero">

<div>

<h1>Anime Wallpapers</h1>
<p>High quality anime wallpapers</p>

</div>

<img id="preview" src="images/Yami Sukehiro Desktop.png">

</div>

<div class="panel">

<h2>New Wallpapers</h2>

<div class="grid">

<div class="card">
<img src="images/Yami Sukehiro Desktop.png" onclick="setWallpaper(this)">
</div>

<div class="card">
<img src="images/Yami Sukehiro Desktop.png" onclick="setWallpaper(this)">
</div>

<div class="card">
<img src="images/Yami Sukehiro Desktop.png" onclick="setWallpaper(this)">
</div>

<div class="card">
<img src="images/Yami Sukehiro Desktop.png" onclick="setWallpaper(this)">
</div>

</div>

</div>

</div>

<script>

function setWallpaper(img){

document.getElementById("preview").src = img.src;
document.getElementById("bg").style.backgroundImage = "url('" + img.src + "')";

}

document.getElementById("bg").style.backgroundImage =
"url('images/Yami Sukehiro Desktop.png')";

</script>

</body>

</html>
